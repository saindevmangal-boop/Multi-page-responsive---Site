<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Maincraft — Contact</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header class="site-header">
		<h1>Maincraft</h1>
		<nav class="site-nav">
			<a href="index.html">Home</a>
			<a href="about.html">About</a>
			<a href="contact.html" class="active">Contact</a>
			<a href="submissions.html">Submissions</a>
		</nav>
	</header>

	<main class="container">
		<h2>Contact Us</h2>
		<p class="muted">Email: hr@maincrafts.com</p>

		<div class="card">
		<form id="contactForm" novalidate>
			<label for="name">Name</label>
			<input id="name" name="name" type="text" placeholder="Your name">

			<label for="email">Email</label>
			<input id="email" name="email" type="email" placeholder="you@domain.com">

			<label for="message">Message</label>
			<textarea id="message" name="message" rows="6" placeholder="Write your message"></textarea>

			<button type="submit">Send Message</button>
			<p id="formMessage" class="form-message hidden" aria-live="polite"></p>
		</form>
		</div>
	</main>

	<script src="script.js"></script>
</body>
</html>
